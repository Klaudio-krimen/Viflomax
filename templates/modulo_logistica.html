<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística - Viflomax</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --sap-blue: #354a5f; --sap-highlight: #0064d1; }
        body { background-color: #f4f7f9; font-family: sans-serif; }
        .sap-header { background-color: var(--sap-blue); color: white; padding: 12px 20px; }
        .card-route { border-left: 5px solid var(--sap-highlight); border-radius: 8px; }
        .btn-action { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .badge-sector { background: #e1f0ff; color: #0064d1; font-size: 0.75rem; text-transform: uppercase; }
        .venta-btn { background-color: var(--sap-highlight); color: white; font-weight: bold; }
        .venta-btn:hover { background-color: #0056b3; color: white; }
    </style>
</head>
<body>
    <header class="sap-header d-flex justify-content-between align-items-center mb-4">
        <a href="/" class="text-white text-decoration-none"><i class="bi bi-arrow-left"></i> Volver</a>
        <h5 class="m-0">Monitor de Reparto</h5>
        <div class="small">Viflomax</div>
    </header>

    <div class="container">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card bg-white shadow-sm p-3 text-center card-route">
                    <span class="text-muted small">TOTAL ENVASES EN CALLE</span>
                    <h2 class="text-primary m-0 fw-bold">{{ total_envases }}</h2>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table bg-white rounded shadow-sm align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Cliente / Dirección</th>
                        <th class="text-center">Envases</th>
                        <th class="text-end">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in clientes %}
                    <tr>
                        <td>
                            <div class="fw-bold">{{ c.nombre }}</div>
                            <div class="text-muted small"><i class="bi bi-geo-alt"></i> {{ c.direccion }}</div>
                            <span class="badge badge-sector mt-1">{{ c.sector }}</span>
                        </td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center align-items-center gap-2">
                                <a href="/modificar_envases/{{ c.id }}/restar" class="btn btn-outline-danger btn-action">-</a>
                                <span class="fw-bold fs-5">{{ c.envases_prestados }}</span>
                                <a href="/modificar_envases/{{ c.id }}/sumar" class="btn btn-outline-success btn-action">+</a>
                            </div>
                        </td>
                        <td class="text-end">
                            <a href="/registrar_venta/{{ c.id }}" class="btn venta-btn btn-sm">
                                <i class="bi bi-cart-check"></i> VENTA
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
