<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viflomax Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #ebeef2; }
        .sap-header { background-color: #354a5f; color: white; padding: 15px; }
        .tile { 
            background: white; border-radius: 8px; padding: 25px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; text-decoration: none; color: #333; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 160px;
        }
        .tile:hover { transform: translateY(-5px); border-color: #0064d1; }
        .tile i { font-size: 3rem; color: #0064d1; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header class="sap-header d-flex justify-content-between align-items-center">
        <h4 class="m-0"><i class="bi bi-droplet-fill"></i> Viflomax Gestión</h4>
        <div class="d-flex align-items-center gap-3">
            <span class="small"><i class="bi bi-person"></i> {{ current_user.username }}</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Salir</a>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row g-4">
            <div class="col-6 col-md-3"><a href="/logistica" class="tile"><i class="bi bi-truck"></i><b>Logística</b></a></div>
            <div class="col-6 col-md-3"><a href="/inventario" class="tile"><i class="bi bi-box-seam"></i><b>Bodega</b></a></div>
            {% if current_user.rol == 'admin' %}
            <div class="col-6 col-md-3"><a href="/finanzas" class="tile"><i class="bi bi-cash-stack"></i><b>Finanzas</b></a></div>
            <div class="col-6 col-md-3"><a href="/crm" class="tile"><i class="bi bi-people-fill"></i><b>CRM</b></a></div>
            <div class="col-6 col-md-3"><a href="/usuarios" class="tile"><i class="bi bi-shield-lock"></i><b>Usuarios</b></a></div>
            {% endif %}
        </div>
    </div>
</body>
</html>
