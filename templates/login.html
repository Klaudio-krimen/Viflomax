<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Viflomax</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #354a5f; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 8px; width: 350px; shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3 class="mb-4 text-primary">Viflomax Gestión</h3>
        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Usuario" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Contraseña" required>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        {% with messages = get_flashed_messages() %}
          {% if messages %}<p class="text-danger mt-3 small">{{ messages[0] }}</p>{% endif %}
        {% endwith %}
    </div>
</body>
</html>
