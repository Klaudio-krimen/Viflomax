<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Viflomax</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .sap-header { background-color: #354a5f; color: white; padding: 15px; }
    </style>
</head>
<body class="bg-light">
    <header class="sap-header d-flex justify-content-between">
        <a href="/" class="text-white text-decoration-none"><i class="bi bi-arrow-left"></i> Volver</a>
        <h5 class="m-0">Gestión de Usuarios</h5>
        <span></span>
    </header>
    <div class="container mt-4">
        <div class="card p-3 mb-4 shadow-sm border-0">
            <h6>Crear Nuevo Perfil</h6>
            <form action="/crear_usuario" method="POST" class="row g-2">
                <div class="col-md-4"><input type="text" name="username" class="form-control" placeholder="Usuario" required></div>
                <div class="col-md-4"><input type="password" name="password" class="form-control" placeholder="Clave" required></div>
                <div class="col-md-3">
                    <select name="rol" class="form-select">
                        <option value="trabajador">Trabajador</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <div class="col-md-1"><button type="submit" class="btn btn-primary w-100"><i class="bi bi-plus"></i></button></div>
            </form>
        </div>
        <table class="table bg-white shadow-sm rounded">
            <thead class="table-dark"><tr><th>Usuario</th><th>Rol</th><th>Estado</th></tr></thead>
            <tbody>
                {% for u in usuarios %}
                <tr><td>{{ u.username }}</td><td><span class="badge bg-info text-dark">{{ u.rol }}</span></td><td>Activo</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
